<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <link rel="icon" href="%PUBLIC_URL%/favicon.ico" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="#000000" />
  <meta name="description" content="ScreenPilot++ - Secure, Stateless Web IDE with AI Coding Bench" />
  <meta name="robots" content="noindex, nofollow, noarchive, nosnippet" />
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />
  <link rel="apple-touch-icon" href="%PUBLIC_URL%/logo192.png" />
  <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />
  <title>ScreenPilot++ IDE</title>
  <style>
    /* Reset and secure base styles */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    html, body {
      height: 100%;
      overflow: hidden;
      background: #1a1a1a;
      color: #ffffff;
      font-family: 'JetBrains Mono', 'Fira Code', 'Consolas', monospace;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }
    
    #root {
      height: 100vh;
      width: 100vw;
      position: relative;
    }
    
    /* Prevent memory leaks and hijacking */
    .no-memory {
      -webkit-user-select: none;
      -moz-user-select: none;
      -ms-user-select: none;
      user-select: none;
    }
    
    /* Secure loading screen */
    .loading-screen {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      z-index: 9999;
    }
    
    .loading-logo {
      font-size: 3rem;
      font-weight: bold;
      margin-bottom: 1rem;
      color: white;
      text-shadow: 0 0 20px rgba(255,255,255,0.5);
    }
    
    .loading-text {
      font-size: 1.2rem;
      color: rgba(255,255,255,0.8);
      margin-bottom: 2rem;
    }
    
    .loading-spinner {
      width: 50px;
      height: 50px;
      border: 3px solid rgba(255,255,255,0.3);
      border-top: 3px solid white;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }
    
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    
    /* Hide loading screen when app loads */
    .app-loaded .loading-screen {
      display: none;
    }
  </style>
</head>
<body class="no-memory">
  <noscript>You need to enable JavaScript to run ScreenPilot++ IDE.</noscript>
  
  <div class="loading-screen" id="loading-screen">
    <div class="loading-logo">🚀 ScreenPilot++</div>
    <div class="loading-text">Initializing Secure IDE Environment...</div>
    <div class="loading-spinner"></div>
  </div>
  
  <div id="root"></div>
  
  <script>
    // Secure initialization - no memory persistence
    (function() {
      'use strict';
      
      // Clear any existing data on load
      if (typeof(Storage) !== "undefined") {
        try {
          localStorage.clear();
          sessionStorage.clear();
        } catch(e) {
          console.warn('Storage clear failed:', e);
        }
      }
      
      // Prevent memory leaks
      window.addEventListener('beforeunload', function() {
        // Clear all event listeners and references
        document.removeEventListener('click', null);
        document.removeEventListener('keydown', null);
        document.removeEventListener('keyup', null);
        
        // Clear any global variables
        if (window.screenpilot) {
          delete window.screenpilot;
        }
      });
      
      // Hide loading screen when React app loads
      window.addEventListener('load', function() {
        setTimeout(function() {
          const loadingScreen = document.getElementById('loading-screen');
          if (loadingScreen) {
            loadingScreen.style.display = 'none';
          }
          document.body.classList.add('app-loaded');
        }, 1000);
      });
      
      // Security: Prevent context menu and dev tools
      document.addEventListener('contextmenu', function(e) {
        e.preventDefault();
        return false;
      });
      
      // Prevent F12, Ctrl+Shift+I, etc.
      document.addEventListener('keydown', function(e) {
        if (e.key === 'F12' || 
            (e.ctrlKey && e.shiftKey && e.key === 'I') ||
            (e.ctrlKey && e.shiftKey && e.key === 'C') ||
            (e.ctrlKey && e.shiftKey && e.key === 'J')) {
          e.preventDefault();
          return false;
        }
      });
      
    })();
  </script>
</body>
</html>

#cloud-config
# DigitalOcean Droplet "Can't-Break-It" Setup
# This cloud-init script hardens the server, installs Docker + Node.js + PM2,
# sets up a non-root user, configures UFW firewall, and enables Fail2Ban

# Set timezone
timezone: America/New_York

# Update system packages
package_update: true
package_upgrade: true

# Create users
users:
  - default
  - name: rawr
    groups: [sudo, docker]
    shell: /bin/bash
    sudo: ALL=(ALL) NOPASSWD:ALL
    ssh_authorized_keys:
      - ssh-ed25519 AAAA...REPLACE_WITH_YOUR_PUBLIC_KEY...
    # Optional: set a password for the user (uncomment if needed)
    # passwd: $6$rounds=4096$salt$hashedpassword

# Install essential packages
packages:
  - ufw                    # Uncomplicated Firewall
  - fail2ban              # Intrusion prevention
  - git                   # Version control
  - curl                  # HTTP client
  - wget                  # Download utility
  - htop                  # System monitor
  - vim                   # Text editor
  - unzip                 # Archive utility
  - nodejs                # Node.js runtime
  - npm                   # Node package manager
  - docker.io             # Docker container runtime
  - docker-compose        # Docker Compose
  - nginx                 # Web server (optional)
  - certbot               # SSL certificate automation
  - python3-certbot-nginx # Nginx certbot plugin

# Run commands after package installation
runcmd:
  # Configure firewall
  - ufw allow OpenSSH
  - ufw allow 80/tcp
  - ufw allow 443/tcp
  - ufw --force enable
  
  # Enable and start Docker
  - systemctl enable --now docker
  
  # Add rawr user to docker group (if not already done)
  - usermod -aG docker rawr
  
  # Install PM2 globally
  - npm install -g pm2
  
  # Install additional useful Node.js tools
  - npm install -g nodemon yarn
  
  # Configure Fail2Ban
  - systemctl enable --now fail2ban
  
  # Create common directories
  - mkdir -p /home/rawr/apps
  - mkdir -p /home/rawr/logs
  - chown -R rawr:rawr /home/rawr/apps
  - chown -R rawr:rawr /home/rawr/logs
  
  # Set up log rotation for PM2
  - pm2 install pm2-logrotate
  
  # Configure PM2 to start on boot
  - su - rawr -c "pm2 startup systemd -u rawr --hp /home/rawr"
  
  # Create a simple health check script
  - echo '#!/bin/bash\necho "Server is healthy - $(date)"' > /home/rawr/health-check.sh
  - chmod +x /home/rawr/health-check.sh
  - chown rawr:rawr /home/rawr/health-check.sh
  
  # Log completion
  - echo "✅ DigitalOcean Droplet setup complete - $(date)" | systemd-cat -t cloud-init
  - echo "✅ Server hardened with UFW, Fail2Ban, Docker, Node.js, and PM2" | systemd-cat -t cloud-init

# Write files
write_files:
  # Fail2Ban configuration for SSH
  - path: /etc/fail2ban/jail.local
    content: |
      [DEFAULT]
      bantime = 3600
      findtime = 600
      maxretry = 3
      
      [sshd]
      enabled = true
      port = ssh
      filter = sshd
      logpath = /var/log/auth.log
      maxretry = 3
      bantime = 3600
    permissions: '0644'
  
  # Docker daemon configuration
  - path: /etc/docker/daemon.json
    content: |
      {
        "log-driver": "json-file",
        "log-opts": {
          "max-size": "10m",
          "max-file": "3"
        },
        "live-restore": true
      }
    permissions: '0644'
  
  # Nginx default configuration (optional)
  - path: /etc/nginx/sites-available/default
    content: |
      server {
          listen 80 default_server;
          listen [::]:80 default_server;
          
          root /var/www/html;
          index index.html index.htm index.nginx-debian.html;
          
          server_name _;
          
          location / {
              try_files $uri $uri/ =404;
          }
          
          location /health {
              access_log off;
              return 200 "healthy\n";
              add_header Content-Type text/plain;
          }
      }
    permissions: '0644'

# Final message
final_message: |
  🚀 DigitalOcean Droplet setup complete!
  
  Your server is now configured with:
  ✅ Hardened security (UFW + Fail2Ban)
  ✅ Docker container runtime
  ✅ Node.js + npm + PM2
  ✅ Non-root user 'rawr' with sudo access
  ✅ Firewall configured (SSH, HTTP, HTTPS)
  ✅ Log rotation and monitoring
  
  Next steps:
  1. SSH into your server: ssh rawr@YOUR_DROPLET_IP
  2. Clone your application: git clone https://github.com/you/your-app.git
  3. Start with PM2: pm2 start ecosystem.config.js
  4. Save PM2 config: pm2 save && pm2 startup
  
  Server ready for production! 🎉